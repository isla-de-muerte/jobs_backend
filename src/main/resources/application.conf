ktor {
    deployment {
        port = 8080
    }

    application {
        modules = [ ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/jobs_db"
    user = "jobs_user"
    password = "jobs_password"
}

jwt {
    issuer = "jobs-api"
    audience = "jobs-mobile"
    realm = "jobs-api"
    accessSecret = "change-me-access-secret"
    refreshSecret = "change-me-refresh-secret"
    accessTtlMinutes = 15
    refreshTtlDays = 30
}